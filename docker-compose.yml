services:
  coredns:
    image: coredns/coredns:latest
    command: -conf /etc/coredns/Corefile
    ports:
      - "53:53/udp"
      - "53:53/tcp"
    volumes:
      - ./coredns:/etc/coredns
    networks:
      - internal
    restart: always

  caddy:
    image: caddy:latest
    ports:
      - "80:80"
      - "443:443"
      # Caddy admin API NOT exposed to host — only accessible within internal network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    environment:
      - ROUTEROOT_DOMAIN=${ROUTEROOT_DOMAIN:-routeroot.dev}
    networks:
      - internal
    restart: always

  agent-api:
    build: ./agent-api
    ports:
      - "127.0.0.1:8053:8053"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./coredns:/dns-config
      - ./data:/data
    environment:
      - ROUTEROOT_DOMAIN=${ROUTEROOT_DOMAIN:-routeroot.dev}
      - ROUTEROOT_DOMAINS=${ROUTEROOT_DOMAINS:-${ROUTEROOT_DOMAIN:-routeroot.dev}}
      - ROUTEROOT_SERVER_IP=${ROUTEROOT_SERVER_IP}
      - ROUTEROOT_API_KEY=${ROUTEROOT_API_KEY}
      - ROUTEROOT_MAX_DEPLOYMENTS=${ROUTEROOT_MAX_DEPLOYMENTS:-20}
      - ROUTEROOT_DEFAULT_TTL=${ROUTEROOT_DEFAULT_TTL:-48h}
      - ROUTEROOT_MAX_MEMORY=${ROUTEROOT_MAX_MEMORY:-2048}
      - ROUTEROOT_MAX_CPUS=${ROUTEROOT_MAX_CPUS:-2}
      - ROUTEROOT_CADDY_ADMIN=http://caddy:2019
      - ROUTEROOT_GITHUB_WEBHOOK_SECRET=${ROUTEROOT_GITHUB_WEBHOOK_SECRET:-}
      - ROUTEROOT_ALLOWED_REPO_HOSTS=${ROUTEROOT_ALLOWED_REPO_HOSTS:-github.com,gitlab.com,bitbucket.org}
      - ROUTEROOT_LOG_FORMAT=${ROUTEROOT_LOG_FORMAT:-human}
      - DATABASE_PATH=/data/routeroot.db
      - ZONE_FILE_DIR=/dns-config/zones
      - COREFILE_PATH=/dns-config/Corefile
    depends_on:
      - coredns
      - caddy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8053/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: always

networks:
  internal:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
